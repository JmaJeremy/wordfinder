<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Finder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>Word Finder</h1>
    <p class="subtitle">NWL2023 &mdash; words of 4+ letters</p>

    <form id="form">
      <div class="field">
        <label for="optional">Available letters</label>
        <input id="optional" type="text" placeholder="e.g. abcdefg" autocomplete="off" spellcheck="false">
      </div>
      <div class="field">
        <label for="required">Must include <span class="hint">(optional)</span></label>
        <input id="required" type="text" placeholder="e.g. b" autocomplete="off" spellcheck="false">
      </div>
      <button type="submit" id="btn">Find Words</button>
    </form>

    <div id="status"></div>
    <div id="results"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
